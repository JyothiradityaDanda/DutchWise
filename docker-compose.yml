version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dutchwise}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in environment}
      POSTGRES_DB: ${DB_NAME:-dutchwise}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dutchwise}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-dutchwise}:${DB_PASSWORD}@db:5432/${DB_NAME:-dutchwise}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in environment}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "4000:4000"

volumes:
  pgdata:
